name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-dev
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install validation dependencies
        run: python -m pip install -e '.[dev]'

      - name: Validate contracts and runner
        run: python -m unittest discover -s tests -v

      - name: Generate job parameters
        run: python tools/batchjobs_compile.py --output "$RUNNER_TEMP/jobs.parameters.json"

      - name: Compile Bicep
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
    env:
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_ENVIRONMENT_NAME: ${{ vars.AZURE_ENVIRONMENT_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify deployment configuration
        shell: bash
        run: |
          required=(
            AZURE_ACR_NAME
            AZURE_CLIENT_ID
            AZURE_CLIENT_SECRET
            AZURE_ENVIRONMENT_NAME
            AZURE_LOCATION
            AZURE_RESOURCE_GROUP
            AZURE_SUBSCRIPTION_ID
            AZURE_TENANT_ID
          )
          for variable in "${required[@]}"; do
            if [[ -z "${!variable}" ]]; then
              echo "GitHub environment variable ${variable} is required." >&2
              exit 1
            fi
          done

      - name: Generate job parameters
        id: jobs
        shell: bash
        run: |
          jobs_parameters="$RUNNER_TEMP/jobs.parameters.json"
          python tools/batchjobs_compile.py --output "$jobs_parameters"
          echo "path=$jobs_parameters" >> "$GITHUB_OUTPUT"

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ vars.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ vars.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ vars.AZURE_TENANT_ID }}"
            }

      - name: Build and push runtime image
        id: image
        shell: bash
        run: |
          image_repository="batchjobs/runtime"
          image_tag="git-${GITHUB_SHA:0:12}"

          az acr build \
            --registry "$AZURE_ACR_NAME" \
            --image "${image_repository}:${image_tag}" \
            --file Dockerfile \
            .

          digest=$(az acr repository show \
            --name "$AZURE_ACR_NAME" \
            --image "${image_repository}:${image_tag}" \
            --query digest \
            --output tsv)
          login_server=$(az acr show \
            --name "$AZURE_ACR_NAME" \
            --query loginServer \
            --output tsv)

          if [[ -z "$digest" || -z "$login_server" ]]; then
            echo "Unable to resolve the pushed image digest." >&2
            exit 1
          fi

          image_reference="${login_server}/${image_repository}@${digest}"
          echo "reference=${image_reference}" >> "$GITHUB_OUTPUT"
          echo "### Runtime image" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${image_reference}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Validate Bicep deployment
        shell: bash
        run: |
          az deployment group validate \
            --name "batchjobs-${AZURE_ENVIRONMENT_NAME}-${GITHUB_RUN_NUMBER}-validate" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters "${{ steps.jobs.outputs.path }}" \
            --parameters \
              location="$AZURE_LOCATION" \
              environmentName="$AZURE_ENVIRONMENT_NAME" \
              imageReference="${{ steps.image.outputs.reference }}" \
              deployJobs=true \
            --output none

      - name: Preview Bicep deployment
        shell: bash
        run: |
          az deployment group what-if \
            --name "batchjobs-${AZURE_ENVIRONMENT_NAME}-${GITHUB_RUN_NUMBER}-whatif" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters "${{ steps.jobs.outputs.path }}" \
            --parameters \
              location="$AZURE_LOCATION" \
              environmentName="$AZURE_ENVIRONMENT_NAME" \
              imageReference="${{ steps.image.outputs.reference }}" \
              deployJobs=true

      - name: Deploy Bicep
        id: deployment
        shell: bash
        run: |
          deployment_name="batchjobs-${AZURE_ENVIRONMENT_NAME}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          provisioning_state=$(az deployment group create \
            --name "$deployment_name" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters "${{ steps.jobs.outputs.path }}" \
            --parameters \
              location="$AZURE_LOCATION" \
              environmentName="$AZURE_ENVIRONMENT_NAME" \
              imageReference="${{ steps.image.outputs.reference }}" \
              deployJobs=true \
            --query properties.provisioningState \
            --output tsv)

          echo "### Bicep deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Name: \`${deployment_name}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Resource group: \`${AZURE_RESOURCE_GROUP}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- State: \`${provisioning_state}\`" >> "$GITHUB_STEP_SUMMARY"